<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <article data-testid="test-profile-card" aria-label="Profile card for Zachariah Yiltong">

    <div class="top-row">
      <figure>
        <img
          data-testid="test-user-avatar"
          src="IMG_20250906_121750.jpg"
          alt="Zachariah Yiltong — illustrated avatar of a young man with short dark hair and a warm smile"
          width="90"
          height="90"
        />
      </figure>
      <div>
        <h2 data-testid="test-user-name">Zachariah Yiltong</h2>
      </div>
    </div>

    <p data-testid="test-user-bio">
      Passionate frontend developer who loves crafting beautiful, accessible web experiences.
    </p>

    <hr class="divider" />

    <div class="time-label" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Current Time:
    </div>

    <div
      class="time-display"
      role="status"
      aria-live="polite"
      aria-label="Current time"
      data-testid="test-user-time"
    >
      <!-- <div class="time-block">
        <span class="time-value" id="time-days">0</span>
        <span class="time-unit">days</span>
      </div>
      <span class="time-sep">:</span>
      <div class="time-block">
        <span class="time-value" id="time-hours">00</span>
        <span class="time-unit">hrs</span>
      </div>
      <span class="time-sep">:</span>
      <div class="time-block">
        <span class="time-value" id="time-mins">00</span>
        <span class="time-unit">min</span>
      </div>
      <span class="time-sep">:</span>
      <div class="time-block">
        <span class="time-value" id="time-secs">00</span>
        <span class="time-unit">sec</span>
      </div> -->

      <div class="epoch-big" role="status" aria-live="polite" aria-label="Current epoch time in milliseconds">
      <span data-testid="test-user-time" id="epoch-display">—</span>
      <span class="epoch-unit">ms</span>
      </div>
    </div>

    <hr class="divider" />

    <nav aria-label="Social media links">
      <ul data-testid="test-user-social-links">
        
        <li>
          <a
            data-testid="test-user-social-linkedin"
            href="https://www.linkedin.com/in/zachariah-yiltong-0b7a14316"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Zachariah Yiltong on LinkedIn (opens in new tab)"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46C23.2 24 24 23.23 24 22.28V1.72C24 .77 23.2 0 22.23 0z"/>
            </svg>
            Linkedin
          </a>
        </li>
        <li>
          <a
            data-testid="test-user-social-github"
            href="https://github.com/Yiltong"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Zachariah Yiltong on GitHub (opens in new tab)"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4 11.5 11.5 0 0 1 3 .4c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            GritHub
          </a>
        </li>
        <li>
          <a
            data-testid="test-user-social-twitter"
            href="https://twitter.com/ZachariahYiltong"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Zachariah Yiltong on Twitter/X (opens in new tab)"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            Twitter/X
          </a>
        </li>
      </ul>
    </nav>

    <hr class="divider" />

    <div class="lists-row">
      <section aria-labelledby="hob-heading">
        <h3 id="hob-heading">Hobbies</h3>
        <ul data-testid="test-user-hobbies" aria-label="Hobbies list">
          <li>Coding</li>
          <li>Hiking</li>
          <li>Photography</li>
          <li>Coffee tasting</li>
        </ul>
      </section>
      <section aria-labelledby="dis-heading">
        <h3 id="dis-heading">Dislikes</h3>
        <ul data-testid="test-user-dislikes" aria-label="Dislikes list">
          <li>Bugs</li>
          <li>Early mornings</li>
          <li>Pineapple on pizza</li>
        </ul>
      </section>
    </div>

  </article>

  <script src="time.js"></script>

</body>
</html>
